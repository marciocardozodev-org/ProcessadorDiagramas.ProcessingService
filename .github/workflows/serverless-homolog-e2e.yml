name: CI/CD - ProcessadorDiagramas.ProcessingService

on:
  push:
    branches: [ develop, homolog, master ]
  pull_request:
    branches: [ develop, homolog, master ]

env:
  DOTNET_VERSION: 8.0.x
  IMAGE_NAME: marciocardozodev/processador-diagramas-processingservice
  APP_NAME: processador-diagramas-processingservice
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || 'processador-diagramas-shared-eks' }}

jobs:
  build-test-deploy:
    name: Build, Test & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore solution
        run: dotnet restore ProcessadorDiagramas.ProcessingService.sln --verbosity minimal

      - name: Build solution
        run: dotnet build ProcessadorDiagramas.ProcessingService.sln --no-restore --configuration Release --verbosity minimal

      - name: Run tests
        run: dotnet test ProcessadorDiagramas.ProcessingService.sln --no-build --configuration Release --verbosity minimal --logger "console;verbosity=minimal"

      - name: Validate required secrets
        if: github.event_name == 'push' && (github.ref_name == 'homolog' || github.ref_name == 'master')
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
        run: |
          MISSING=""
          [ -z "$DOCKERHUB_USERNAME" ] && MISSING="$MISSING DOCKERHUB_USERNAME"
          [ -z "$DOCKERHUB_TOKEN" ] && MISSING="$MISSING DOCKERHUB_TOKEN"
          [ -z "$AWS_ACCESS_KEY_ID" ] && MISSING="$MISSING AWS_ACCESS_KEY_ID"
          [ -z "$AWS_SECRET_ACCESS_KEY" ] && MISSING="$MISSING AWS_SECRET_ACCESS_KEY"
          [ -z "$AWS_SESSION_TOKEN" ] && MISSING="$MISSING AWS_SESSION_TOKEN"

          if [ -n "$MISSING" ]; then
            echo "[ERROR] Secrets obrigatórios ausentes:$MISSING"
            echo "[INFO] Configure os secrets em Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Build Docker image
        if: github.event_name == 'push' && (github.ref_name == 'homolog' || github.ref_name == 'master')
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} -f Dockerfile .

      - name: Login no Docker Hub
        if: github.event_name == 'push' && (github.ref_name == 'homolog' || github.ref_name == 'master')
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push Docker image
        if: github.event_name == 'push' && (github.ref_name == 'homolog' || github.ref_name == 'master')
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:${{ github.ref_name }}-latest
          docker push ${{ env.IMAGE_NAME }}:${{ github.ref_name }}-latest

      - name: Configure AWS credentials
        if: github.event_name == 'push' && (github.ref_name == 'homolog' || github.ref_name == 'master')
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}"         >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> "$GITHUB_ENV"
          echo "AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }}"          >> "$GITHUB_ENV"
          echo "AWS_DEFAULT_REGION=${{ env.AWS_REGION }}"                    >> "$GITHUB_ENV"

      - name: Setup kubectl
        if: github.event_name == 'push' && (github.ref_name == 'homolog' || github.ref_name == 'master')
        uses: azure/setup-kubectl@v4

      - name: Check EKS cluster availability
        id: check-eks
        if: github.event_name == 'push' && (github.ref_name == 'homolog' || github.ref_name == 'master')
        run: |
          set +e
          aws eks describe-cluster --region "${{ env.AWS_REGION }}" --name "${{ env.EKS_CLUSTER_NAME }}" >/tmp/eks-describe.out 2>&1
          RC=$?
          set -e

          if [ "$RC" -eq 0 ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "[INFO] Cluster EKS encontrado: ${{ env.EKS_CLUSTER_NAME }}"
            exit 0
          fi

          if grep -q "ResourceNotFoundException" /tmp/eks-describe.out; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Cluster EKS '${{ env.EKS_CLUSTER_NAME }}' nao encontrado. Etapas de Kubernetes serao ignoradas nesta execucao."
            exit 0
          fi

          echo "[ERROR] Falha ao consultar cluster EKS '${{ env.EKS_CLUSTER_NAME }}'."
          cat /tmp/eks-describe.out
          exit "$RC"

      - name: Ensure deploy target exists
        if: github.event_name == 'push' && (github.ref_name == 'homolog' || github.ref_name == 'master')
        run: |
          if [ "${{ steps.check-eks.outputs.exists }}" != "true" ]; then
            echo "[ERROR] Cluster EKS '${{ env.EKS_CLUSTER_NAME }}' nao encontrado. Deploy nao foi executado."
            exit 1
          fi

      - name: Resolve default connection string
        id: resolve-db
        if: github.event_name == 'push' && (github.ref_name == 'homolog' || github.ref_name == 'master')
        env:
          DB_CONNECTION_SSM_ARN: ${{ github.ref_name == 'master' && vars.PROD_DB_CONNECTION_SSM_ARN || vars.HOMOLOG_DB_CONNECTION_SSM_ARN }}
          FALLBACK_CONNECTION: ${{ secrets.CONNECTIONSTRINGS__DEFAULTCONNECTION }}
        run: |
          CONNECTION_STRING="$FALLBACK_CONNECTION"

          if [ -n "$DB_CONNECTION_SSM_ARN" ]; then
            RESOLVED_FROM_SSM=$(aws ssm get-parameter --name "$DB_CONNECTION_SSM_ARN" --with-decryption --query 'Parameter.Value' --output text 2>/tmp/ssm.err || true)
            if [ -n "$RESOLVED_FROM_SSM" ]; then
              CONNECTION_STRING="$RESOLVED_FROM_SSM"
              echo "[INFO] Connection string resolvida via SSM."
            else
              echo "::warning::Nao foi possivel resolver DB via SSM. Usando fallback CONNECTIONSTRINGS__DEFAULTCONNECTION."
              cat /tmp/ssm.err || true
            fi
          else
            echo "::warning::DB_CONNECTION_SSM_ARN nao definida. Usando fallback CONNECTIONSTRINGS__DEFAULTCONNECTION."
          fi

          if [ -z "$CONNECTION_STRING" ]; then
            echo "[ERROR] Nenhuma connection string disponivel (SSM e fallback vazios)."
            exit 1
          fi

          {
            echo "connection_string<<EOF"
            echo "$CONNECTION_STRING"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Generate kubeconfig
        if: github.event_name == 'push' && (github.ref_name == 'homolog' || github.ref_name == 'master') && steps.check-eks.outputs.exists == 'true'
        run: aws eks update-kubeconfig --region "${{ env.AWS_REGION }}" --name "${{ env.EKS_CLUSTER_NAME }}"

      - name: Ensure namespace
        if: github.event_name == 'push' && (github.ref_name == 'homolog' || github.ref_name == 'master') && steps.check-eks.outputs.exists == 'true'
        env:
          K8S_NAMESPACE: ${{ github.ref_name == 'master' && 'production' || 'homolog' }}
        run: kubectl create namespace "$K8S_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

      - name: Ensure application configmap
        if: github.event_name == 'push' && (github.ref_name == 'homolog' || github.ref_name == 'master') && steps.check-eks.outputs.exists == 'true'
        env:
          K8S_NAMESPACE: ${{ github.ref_name == 'master' && 'production' || 'homolog' }}
        run: |
          kubectl create configmap ${{ env.APP_NAME }}-config \
            --from-literal=ASPNETCORE_ENVIRONMENT="Production" \
            --from-literal=ASPNETCORE_URLS="http://+:8080" \
            --from-literal=EnableAwsServices="true" \
            --from-literal=Aws__Region="${{ env.AWS_REGION }}" \
            --from-literal=DiagramSourceStorage__Provider="S3" \
            --from-literal=AiProvider__Enabled="true" \
            --from-literal=AiProvider__Provider="OpenAICompatible" \
            --from-literal=AiProvider__Model="${{ vars.AI_PROVIDER_MODEL || 'gpt-4o-mini' }}" \
            --from-literal=AiProvider__Temperature="${{ vars.AI_PROVIDER_TEMPERATURE || '0.2' }}" \
            --from-literal=AiProvider__MaxTokens="${{ vars.AI_PROVIDER_MAX_TOKENS || '500' }}" \
            --from-literal=AiProvider__MaxInputCharacters="${{ vars.AI_PROVIDER_MAX_INPUT_CHARACTERS || '12000' }}" \
            --from-literal=AiProvider__TimeoutSeconds="${{ vars.AI_PROVIDER_TIMEOUT_SECONDS || '60' }}" \
            -n "$K8S_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

      - name: Ensure application secrets
        if: github.event_name == 'push' && (github.ref_name == 'homolog' || github.ref_name == 'master') && steps.check-eks.outputs.exists == 'true'
        env:
          K8S_NAMESPACE: ${{ github.ref_name == 'master' && 'production' || 'homolog' }}
          DEFAULT_CONNECTION: ${{ steps.resolve-db.outputs.connection_string }}
          AWS_REGION: ${{ env.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_TOPIC_ARN: ${{ secrets.AWS__TOPICARN }}
          AWS_QUEUE_URL: ${{ secrets.AWS__QUEUEURL }}
          DIAGRAM_SOURCE_BUCKET: ${{ vars.DIAGRAM_SOURCE_BUCKET_NAME }}
          DIAGRAM_SOURCE_PREFIX: ${{ vars.DIAGRAM_SOURCE_KEY_PREFIX || 'inputs/' }}
          AI_PROVIDER_BASE_URL: ${{ vars.AI_PROVIDER_BASE_URL || 'https://api.openai.com/' }}
          AI_PROVIDER_API_KEY: ${{ secrets.AI_PROVIDER_API_KEY }}
        run: |
          kubectl create secret generic ${{ env.APP_NAME }}-secrets \
            --from-literal=ConnectionStrings__DefaultConnection="$DEFAULT_CONNECTION" \
            --from-literal=Aws__Region="$AWS_REGION" \
            --from-literal=AWS_ACCESS_KEY_ID="$AWS_ACCESS_KEY_ID" \
            --from-literal=AWS_SECRET_ACCESS_KEY="$AWS_SECRET_ACCESS_KEY" \
            --from-literal=AWS_SESSION_TOKEN="$AWS_SESSION_TOKEN" \
            --from-literal=Aws__TopicArn="$AWS_TOPIC_ARN" \
            --from-literal=Aws__QueueUrl="$AWS_QUEUE_URL" \
            --from-literal=DiagramSourceStorage__BucketName="$DIAGRAM_SOURCE_BUCKET" \
            --from-literal=DiagramSourceStorage__KeyPrefix="$DIAGRAM_SOURCE_PREFIX" \
            --from-literal=AiProvider__BaseUrl="$AI_PROVIDER_BASE_URL" \
            --from-literal=AiProvider__ApiKey="$AI_PROVIDER_API_KEY" \
            -n "$K8S_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

      - name: Run database migrations
        if: github.event_name == 'push' && (github.ref_name == 'homolog' || github.ref_name == 'master') && steps.check-eks.outputs.exists == 'true'
        env:
          K8S_NAMESPACE: ${{ github.ref_name == 'master' && 'production' || 'homolog' }}
        run: |
          kubectl -n "$K8S_NAMESPACE" delete job ${{ env.APP_NAME }}-migrations --ignore-not-found=true
          sed "s|\${IMAGE_TAG}|${{ github.sha }}|g" deploy/k8s/create-db-job.yaml | kubectl -n "$K8S_NAMESPACE" apply -f -
          kubectl wait --for=condition=complete --timeout=300s job/${{ env.APP_NAME }}-migrations -n "$K8S_NAMESPACE" || {
            kubectl describe job/${{ env.APP_NAME }}-migrations -n "$K8S_NAMESPACE" || true
            POD=$(kubectl get pods -n "$K8S_NAMESPACE" -l job-name=${{ env.APP_NAME }}-migrations -o jsonpath='{.items[0].metadata.name}')
            kubectl logs "$POD" -n "$K8S_NAMESPACE" || true
            exit 1
          }

      - name: Deploy to Kubernetes
        if: github.event_name == 'push' && (github.ref_name == 'homolog' || github.ref_name == 'master') && steps.check-eks.outputs.exists == 'true'
        env:
          K8S_NAMESPACE: ${{ github.ref_name == 'master' && 'production' || 'homolog' }}
        run: |
          kubectl -n "$K8S_NAMESPACE" apply -f deploy/k8s/service.yaml
          sed "s|\${IMAGE_TAG}|${{ github.sha }}|g" deploy/k8s/deployment.yaml | kubectl -n "$K8S_NAMESPACE" apply -f -
          kubectl rollout status deployment/${{ env.APP_NAME }} -n "$K8S_NAMESPACE" --timeout=10m

      - name: Smoke test API in EKS
        if: github.event_name == 'push' && (github.ref_name == 'homolog' || github.ref_name == 'master') && steps.check-eks.outputs.exists == 'true'
        env:
          K8S_NAMESPACE: ${{ github.ref_name == 'master' && 'production' || 'homolog' }}
        run: |
          kubectl -n "$K8S_NAMESPACE" port-forward svc/${{ env.APP_NAME }} 18080:80 >/tmp/pf.log 2>&1 &
          PF_PID=$!
          trap 'kill $PF_PID >/dev/null 2>&1 || true' EXIT

          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:18080/health >/tmp/health.out; then
              break
            fi
            sleep 3
          done

          test -s /tmp/health.out
          grep -Eqi "healthy|ok" /tmp/health.out
          curl -fsS http://127.0.0.1:18080/ >/tmp/root.out
